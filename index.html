<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,follow">
  <meta http-equiv="refresh" content="0; url=https://kaujun-lab.pages.dev/">
  <link rel="canonical" href="https://kaujun-lab.pages.dev/">
  <title>サイトを移転しました｜買う順ラボ</title>
  <meta name="description" content="買う順ラボは新しいURLへ移転しました。">
  <script>
    window.location.replace("https://kaujun-lab.pages.dev/");
  </script>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172221;
      background: #f4f7f6;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
    }

    main {
      width: min(100%, 560px);
      padding: 40px;
      border: 1px solid #d6e1df;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 12px 32px rgba(23, 34, 33, 0.08);
      text-align: center;
    }

    p {
      margin: 0 0 24px;
      color: #5d6c6a;
      line-height: 1.8;
    }

    .eyebrow {
      margin-bottom: 8px;
      color: #168a80;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
    }

    a {
      display: inline-block;
      padding: 12px 20px;
      border-radius: 999px;
      color: #fff;
      background: #0d5f58;
      font-weight: 700;
      text-decoration: none;
    }

    a:focus-visible {
      outline: 3px solid #2769c7;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">買う順ラボ</p>
    <h1>サイトを移転しました</h1>
    <p>自動的に新しいサイトへ移動します。移動しない場合は、下のリンクを押してください。</p>
    <a href="https://kaujun-lab.pages.dev/">新しい買う順ラボを開く</a>
  </main>
</body>
</html>
